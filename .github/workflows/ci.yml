name: SOC Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI (.NET 10)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: socplatform
          POSTGRES_USER: socadmin
          POSTGRES_PASSWORD: SocDev2026
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: |
        dotnet restore src/SOCPlatform.API/SOCPlatform.API.csproj
        dotnet restore src/SOCPlatform.Tests/SOCPlatform.Tests.csproj

    - name: Build
      run: |
        dotnet build src/SOCPlatform.API/SOCPlatform.API.csproj --configuration Release --no-restore
        dotnet build src/SOCPlatform.Tests/SOCPlatform.Tests.csproj --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test src/SOCPlatform.Tests/SOCPlatform.Tests.csproj --configuration Release --no-build --verbosity normal
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5433;Database=socplatform;Username=socadmin;Password=SocDev2026;Include Error Detail=true"

  desktop-agent:
    name: Desktop Agent CI (Windows)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/SOCPlatform.DesktopAgent/SOCPlatform.DesktopAgent.csproj

    - name: Build
      run: dotnet build src/SOCPlatform.DesktopAgent/SOCPlatform.DesktopAgent.csproj --configuration Release --no-restore

  ml:
    name: ML CI (Python)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd src/SOCPlatform.ML
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-mock

    - name: Run ML Tests
      run: |
        cd src/SOCPlatform.ML
        python -m pytest tests/ -v

  frontend:
    name: Frontend CI (Node.js)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: |
        cd src/soc-dashboard
        pnpm install --frozen-lockfile

    - name: Lint
      run: |
        cd src/soc-dashboard
        pnpm lint

    - name: Build
      run: |
        cd src/soc-dashboard
        pnpm build
