title: Mimikatz Credential Dumping Indicators
id: sigma-mimikatz-001
description: Detects canonical Mimikatz strings / command-line flags associated with credential dumping from LSASS.
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
detection:
  selection:
    EventAction: ProcessCreate
    CommandLine|contains:
      - sekurlsa::logonpasswords
      - sekurlsa::pth
      - lsadump::sam
      - kerberos::list
      - token::elevate
      - privilege::debug
  condition: selection
