services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL — primary datastore + Hangfire job storage
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: soc-postgres
    environment:
      POSTGRES_DB: socplatform
      POSTGRES_USER: socadmin
      POSTGRES_PASSWORD: SocDev2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socadmin -d socplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — distributed cache + SignalR backplane + rate-limit counters
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    command: ["redis-server", "--requirepass", "SocRedisDev2026", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "SocRedisDev2026", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # RabbitMQ — log ingestion message queue (replaces in-proc Channel<T>)
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: soc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: socadmin
      RABBITMQ_DEFAULT_PASS: SocRabbitDev2026
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # MailHog — fake SMTP server for local email testing
  # ─────────────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: soc-mailhog
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI → http://localhost:8025
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Observability stack (Phase 6) — Jaeger · Prometheus · Grafana
  # Opt-in via profile so developers who don't need them aren't paying RAM.
  # Start with: `docker compose --profile observability up -d`
  # ─────────────────────────────────────────────────────────────────────────
  jaeger:
    profiles: ["observability"]
    image: jaegertracing/all-in-one:1.60
    container_name: soc-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"    # Jaeger UI
      - "4317:4317"      # OTLP gRPC — SOC API sends traces here
      - "4318:4318"      # OTLP HTTP
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.0
    container_name: soc-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"      # Prometheus UI → http://localhost:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"  # so the container can scrape API on the host
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.3.0
    container_name: soc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: SocGrafana2026
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana:/etc/grafana/provisioning/dashboards-src:ro
    depends_on:
      - prometheus
    ports:
      - "3000:3000"      # Grafana → http://localhost:3000
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
